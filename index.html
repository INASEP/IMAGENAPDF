<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INASEP · Imagen a PDF</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0f1a0f;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      color: #e8ede8;
    }

    header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    header img { width: 72px; filter: drop-shadow(0 4px 16px rgba(0,0,0,.6)); }
    header h1  { font-size: 1.1rem; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: #c9b97a; }
    header p   { font-size: .78rem; color: #5a7a5a; }

    .card {
      background: #162016;
      border: 1px solid #2a3d2a;
      border-radius: 14px;
      padding: 28px 24px;
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .drop-zone {
      border: 2px dashed #3a5a3a;
      border-radius: 10px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      position: relative;
      transition: border-color .2s, background .2s;
    }
    .drop-zone:hover, .drop-zone.over { border-color: #c9b97a; background: rgba(201,185,122,.05); }
    .drop-zone input {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .drop-zone .icon  { font-size: 2.4rem; margin-bottom: 10px; }
    .drop-zone .label { font-size: .92rem; color: #8aaa8a; }
    .drop-zone .hint  { font-size: .74rem; color: #4a6a4a; margin-top: 6px; }

    #preview-wrap { display: none; flex-direction: column; gap: 8px; }
    #preview-wrap.visible { display: flex; }
    #preview-img {
      width: 100%; border-radius: 8px; border: 1px solid #2a3d2a;
      max-height: 280px; object-fit: contain; background: #0f1a0f;
    }
    #file-name { font-size: .75rem; color: #4a6a4a; text-align: center; }

    #btn-pdf {
      display: none; width: 100%; padding: 13px;
      background: #4a7a3a; color: #fff;
      font-size: 1rem; font-weight: 600; letter-spacing: .04em;
      border: none; border-radius: 10px; cursor: pointer;
      transition: background .2s;
    }
    #btn-pdf.visible { display: block; }
    #btn-pdf:hover { background: #5a8a4a; }
    #btn-pdf:disabled { opacity: .6; cursor: default; }
  </style>
</head>
<body>

<header>
  <img src="logo_inasep.png" alt="INASEP" />
  <h1>INASEP</h1>
  <p>Convierte tu imagen a PDF</p>
</header>

<div class="card">

  <div class="drop-zone" id="drop-zone">
    <input type="file" id="file-input" accept="image/*" />
    <div class="icon">📎</div>
    <div class="label">Adjunta tu pantallazo aquí</div>
    <div class="hint">PNG · JPG · desde galería o cámara</div>
  </div>

  <div id="preview-wrap">
    <img id="preview-img" alt="Vista previa" />
    <span id="file-name"></span>
  </div>

  <button id="btn-pdf">⬇ Descargar PDF</button>

</div>

<script>
  const { jsPDF } = window.jspdf;

  const dropZone    = document.getElementById('drop-zone');
  const fileInput   = document.getElementById('file-input');
  const previewImg  = document.getElementById('preview-img');
  const previewWrap = document.getElementById('preview-wrap');
  const fileNameEl  = document.getElementById('file-name');
  const btnPdf      = document.getElementById('btn-pdf');

  let imageDataUrl = null;

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault(); dropZone.classList.remove('over');
    if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', () => { if (fileInput.files[0]) loadFile(fileInput.files[0]); });

  function loadFile(file) {
    if (!file.type.startsWith('image/')) { alert('Solo se aceptan imágenes.'); return; }
    const reader = new FileReader();
    reader.onload = e => {
      imageDataUrl = e.target.result;
      previewImg.src = imageDataUrl;
      fileNameEl.textContent = file.name;
      previewWrap.classList.add('visible');
      btnPdf.classList.add('visible');
    };
    reader.readAsDataURL(file);
  }

  btnPdf.addEventListener('click', async () => {
    if (!imageDataUrl) return;
    btnPdf.textContent = '⏳ Generando…';
    btnPdf.disabled = true;

    const tmp = new Image();
    tmp.src = imageDataUrl;
    await new Promise(r => tmp.onload = r);

    const imgW = tmp.naturalWidth;
    const imgH = tmp.naturalHeight;

    // Orientación según la imagen
    const orient = imgW >= imgH ? 'landscape' : 'portrait';
    const doc = new jsPDF({ orientation: orient, unit: 'px', format: [imgW, imgH] });

    const ext = imageDataUrl.startsWith('data:image/png') ? 'PNG' : 'JPEG';
    doc.addImage(imageDataUrl, ext, 0, 0, imgW, imgH);
    doc.save('imagen.pdf');

    btnPdf.textContent = '⬇ Descargar PDF';
    btnPdf.disabled = false;
  });
</script>
</body>
</html>
